name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

  sarif:
    name: SARIF upload to Code Scanning
    runs-on: ubuntu-latest
    needs: pytest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate SARIF output
        run: |
          python -c "
          from src.reporting.generator import ReportGenerator
          from src.attacks.base import AttackResult, Severity
          from pathlib import Path
          import tempfile, json
          gen = ReportGenerator()
          r = AttackResult(test_id='PI-001', test_name='Test', category='prompt_injection',
                           payload='p', response='r', vulnerable=True, severity=Severity.CRITICAL)
          with tempfile.TemporaryDirectory() as tmp:
              out = Path(tmp) / 'sample.sarif'
              gen.generate([r], 'https://example.com', output_format='sarif', output_path=out)
              data = json.loads(out.read_text())
              assert data['version'] == '2.1.0'
              assert data['runs'][0]['tool']['driver']['name'] == 'ANI'
              assert len(data['runs'][0]['results']) == 1
              Path('ani-sample.sarif').write_text(out.read_text())
          "
          ls -la ani-sample.sarif

      - name: Upload SARIF
        if: success()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ani-sample.sarif
          category: ani-sample
